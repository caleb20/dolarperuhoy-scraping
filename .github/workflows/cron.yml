name: Scraper Cron

on:
  schedule:
    - cron: "*/5 * * * *" # cada 15 minutos
  workflow_dispatch: # ejecución manual

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libatk-bridge2.0-0 libdrm2 libgbm1 libasound2 libxkbcommon0

      - name: Set Puppeteer Chrome path
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser" >> $GITHUB_ENV

      - name: Run scraper
        run: npm start
        env:
          SCRAPER_SUPABASE_URL: ${{ secrets.SCRAPER_SUPABASE_URL }}
          SCRAPER_SUPABASE_KEY: ${{ secrets.SCRAPER_SUPABASE_KEY }}
          SCRAPER_REQUEST_TIMEOUT_MS: 15000
          SCRAPER_MAX_HOUSES: 10
          SCRAPER_CONCURRENCY: 3
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true