name: Scraper Cron

on:
  schedule:
    - cron: "*/5 * * * *" # cada 15 minutos
  workflow_dispatch: # ejecución manual

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Google Chrome for Puppeteer
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb 2>/dev/null || sudo apt-get -fy install -qq
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> $GITHUB_ENV

      - name: Run scraper
        run: npm start
        env:
          SCRAPER_SUPABASE_URL: ${{ secrets.SCRAPER_SUPABASE_URL }}
          SCRAPER_SUPABASE_KEY: ${{ secrets.SCRAPER_SUPABASE_KEY }}
          SCRAPER_REQUEST_TIMEOUT_MS: 15000
          SCRAPER_MAX_HOUSES: 10
          SCRAPER_CONCURRENCY: 3
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true